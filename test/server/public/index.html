<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lexxy-realtime · yrby test</title>
    <style>
      body { font: 16px/1.5 system-ui, sans-serif; margin: 2rem; }
      lexxy-editor { display: block; border: 1px solid #ccc; border-radius: 6px; min-height: 8rem; padding: .5rem; }
      [contenteditable] { outline: none; min-height: 6rem; }
    </style>
  </head>
  <body>
    <script>
      window.__err = [];
      addEventListener("error", (e) => window.__err.push(String((e.error && e.error.stack) || e.message)));
      addEventListener("unhandledrejection", (e) => window.__err.push("unhandledrejection: " + String((e.reason && e.reason.stack) || e.reason)));
    </script>
    <h1>lexxy-realtime · yrby</h1>
    <script>
      // Simulates a server-rendered existing Action Text body: Lexxy reads its
      // initial HTML from the value attribute. Written into the markup before
      // the editor element is parsed and upgraded.
      const seedHtml = new URLSearchParams(location.search).get("seedHtml");
      if (seedHtml) {
        document.write(`<lexxy-editor id="editor" name="editor" value="${seedHtml.replace(/"/g, "&quot;")}"></lexxy-editor>`);
      } else {
        document.write('<lexxy-editor id="editor" name="editor"></lexxy-editor>');
      }
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
